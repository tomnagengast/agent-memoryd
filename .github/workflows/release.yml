name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release artifacts
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          commit="$(git rev-parse --short HEAD)"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          module="github.com/tomnagengast/agent-memoryd/internal/version"
          ldflags="-s -w -X ${module}.Version=${version} -X ${module}.Commit=${commit} -X ${module}.Date=${date}"

          mkdir -p dist
          for target in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64; do
            goos="${target%/*}"
            goarch="${target#*/}"
            name="agent-memoryd_${version}_${goos}_${goarch}"
            mkdir -p "dist/${name}"
            GOOS="${goos}" GOARCH="${goarch}" CGO_ENABLED=0 \
              go build -trimpath -ldflags "${ldflags}" -o "dist/${name}/agent-memoryd" ./cmd/agent-memoryd
            tar -C "dist/${name}" -czf "dist/${name}.tar.gz" agent-memoryd
            rm -rf "dist/${name}"
          done

          (cd dist && shasum -a 256 *.tar.gz > checksums.txt)

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/*.tar.gz dist/checksums.txt --verify-tag --generate-notes
