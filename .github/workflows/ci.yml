name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Download zvec native libraries
        run: go run github.com/zvec-ai/zvec-go/cmd/download-libs@v0.5.0 -version v0.5.0 -dest ./lib

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Run tests
        run: go test ./...
        env:
          CGO_ENABLED: "1"
          CGO_CFLAGS: -I${{ github.workspace }}/lib/include
          CGO_LDFLAGS: -L${{ github.workspace }}/lib/linux_amd64 -lzvec_c_api -Wl,-rpath,${{ github.workspace }}/lib/linux_amd64

      - name: Build
        run: go build -o ./memoryd ./cmd/agent-memoryd
        env:
          CGO_ENABLED: "1"
          CGO_CFLAGS: -I${{ github.workspace }}/lib/include
          CGO_LDFLAGS: -L${{ github.workspace }}/lib/linux_amd64 -lzvec_c_api -Wl,-rpath,${{ github.workspace }}/lib/linux_amd64

      - name: Build release archive layout
        run: ./scripts/build-release-artifact.sh
        env:
          MEMORYD_VERSION: ci
          MEMORYD_DATE: "1970-01-01T00:00:00Z"

      - name: Check Homebrew formula template syntax
        run: ruby -c packaging/homebrew/memoryd.rb.tpl
