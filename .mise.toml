[tools]
go = "1.26.3"
goreleaser = "latest"
gh = "latest"
direnv = "latest"
worktrunk = "latest"

[tasks.fmt]
description = "Format Go source"
run = "gofmt -w ."

[tasks.test]
description = "Run Go tests"
run = '''
case "$(uname -s)-$(uname -m)" in
  Darwin-arm64) zvec_platform=darwin_arm64 ;;
  Linux-x86_64) zvec_platform=linux_amd64 ;;
  Linux-aarch64) zvec_platform=linux_arm64 ;;
  *) zvec_platform="" ;;
esac
if [ -n "$zvec_platform" ] && [ -d "./lib/${zvec_platform}" ]; then
  CGO_CFLAGS="-I$(pwd)/lib/include" \
  CGO_LDFLAGS="-L$(pwd)/lib/${zvec_platform} -lzvec_c_api -Wl,-rpath,$(pwd)/lib/${zvec_platform}" \
  CGO_ENABLED=1 go test ./...
else
  go test ./internal/embedder/ ./internal/flock/ ./internal/memory/...
fi
'''

[tasks.build]
description = "Build the memoryd binary (always cgo + zvec)"
run = '''
version="${MEMORYD_VERSION:-$(git describe --tags --always --dirty 2>/dev/null || echo dev)}"
commit="$(git rev-parse --short HEAD 2>/dev/null || true)"
date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
case "$(uname -s)-$(uname -m)" in
  Darwin-arm64) zvec_platform=darwin_arm64 ;;
  Linux-x86_64) zvec_platform=linux_amd64 ;;
  Linux-aarch64) zvec_platform=linux_arm64 ;;
  *) echo "unsupported zvec prebuilt platform: $(uname -s)-$(uname -m)" >&2; exit 1 ;;
esac
CGO_CFLAGS="-I$(pwd)/lib/include" \
CGO_LDFLAGS="-L$(pwd)/lib/${zvec_platform} -lzvec_c_api -Wl,-rpath,$(pwd)/lib/${zvec_platform}" \
CGO_ENABLED=1 go build \
  -ldflags "-X github.com/tomnagengast/agent-memoryd/internal/version.Version=${version} -X github.com/tomnagengast/agent-memoryd/internal/version.Commit=${commit} -X github.com/tomnagengast/agent-memoryd/internal/version.Date=${date}" \
  -o ./memoryd \
  ./cmd/agent-memoryd
'''

[tasks.install-local]
description = "Install memoryd binary and native lib to ~/.local (rpath-independent of working tree)"
run = '''
case "$(uname -s)-$(uname -m)" in
  Darwin-arm64)  zvec_platform=darwin_arm64; libext=dylib ;;
  Linux-x86_64)  zvec_platform=linux_amd64;  libext=so ;;
  Linux-aarch64) zvec_platform=linux_arm64;  libext=so ;;
  *) echo "unsupported platform: $(uname -s)-$(uname -m)" >&2; exit 1 ;;
esac

# Copy native lib to stable runtime location
mkdir -p "${HOME}/.local/lib/memoryd"
cp "./lib/${zvec_platform}/libzvec_c_api.${libext}" "${HOME}/.local/lib/memoryd/"

# Build binary with rpath pointing at installed lib location (not working tree)
version="${MEMORYD_VERSION:-$(git describe --tags --always --dirty 2>/dev/null || echo dev)}"
commit="$(git rev-parse --short HEAD 2>/dev/null || true)"
date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
CGO_CFLAGS="-I$(pwd)/lib/include" \
CGO_LDFLAGS="-L$(pwd)/lib/${zvec_platform} -lzvec_c_api -Wl,-rpath,${HOME}/.local/lib/memoryd" \
CGO_ENABLED=1 go build \
  -ldflags "-X github.com/tomnagengast/agent-memoryd/internal/version.Version=${version} -X github.com/tomnagengast/agent-memoryd/internal/version.Commit=${commit} -X github.com/tomnagengast/agent-memoryd/internal/version.Date=${date}" \
  -o ./memoryd \
  ./cmd/agent-memoryd

# Atomic install of binary
mkdir -p "${HOME}/.local/bin"
tmp="${HOME}/.local/bin/memoryd.new"
cp ./memoryd "${tmp}"
chmod 755 "${tmp}"
mv "${tmp}" "${HOME}/.local/bin/memoryd"

echo "Installed: ${HOME}/.local/bin/memoryd"
echo "Native lib: ${HOME}/.local/lib/memoryd/libzvec_c_api.${libext}"
'''

[tasks.zvec-libs]
description = "Download zvec native libraries for build"
run = "go run github.com/zvec-ai/zvec-go/cmd/download-libs@v0.5.0 -version v0.5.0 -dest ./lib"

[tasks.tidy]
description = "Tidy Go modules"
run = "go mod tidy"

[tasks.release-check]
description = "Run local checks for a tagged GoReleaser/Homebrew release"
depends = ["zvec-libs", "test", "build"]
run = "goreleaser check"

[tasks.doctor]
description = "Check repo toolchain and agent helper CLIs"
run = '''
missing=0
for tool in mise direnv wt gh goreleaser; do
  if command -v "${tool}" >/dev/null 2>&1; then
    printf "%-12s %s\n" "${tool}" "$(command -v "${tool}")"
  else
    printf "%-12s missing\n" "${tool}"
    missing=1
  fi
done

if command -v memoryd >/dev/null 2>&1; then
  printf "%-12s %s\n" "memoryd" "$(command -v memoryd)"
elif [ -x ./memoryd ]; then
  printf "%-12s ./memoryd\n" "memoryd"
else
  printf "%-12s missing; run 'mise run build' or 'mise run install-local'\n" "memoryd"
fi

exit "${missing}"
'''
