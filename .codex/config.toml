
[features]
hooks = true

[[hooks.UserPromptSubmit]]

[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = 'python3 "$(git rev-parse --show-toplevel)/.agents/hooks/research-on-sparse-prompt.py"'
timeout = 150
statusMessage = "Researching sparse prompt"

[[hooks.Stop]]

[[hooks.Stop.hooks]]
type = "command"
command = 'python3 "$(git rev-parse --show-toplevel)/.agents/hooks/reflect-stop.py"'
timeout = 30
statusMessage = "Reflecting on session"

[mcp_servers.agent-memoryd]
command = "agent-memoryd"
args = ["mcp"]
