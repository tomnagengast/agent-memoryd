
[features]
hooks = true

[[hooks.SessionStart]]
matcher = "startup|resume"

[[hooks.SessionStart.hooks]]
type = "command"
command = "osascript -e 'display notification \"Hi Codex\" with title \"Current Path\"'"
timeout = 30
statusMessage = "Loading session notes"

[[hooks.UserPromptSubmit]]

[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = 'python3 "$(git rev-parse --show-toplevel)/.claude/hooks/research-on-sparse-prompt.py"'
timeout = 150
statusMessage = "Researching sparse prompt"

[[hooks.Stop]]

[[hooks.Stop.hooks]]
type = "command"
command = 'python3 "$(git rev-parse --show-toplevel)/.claude/hooks/reflect-stop.py"'
timeout = 30
statusMessage = "Reflecting on session"

[mcp_servers.agent-memoryd]
command = "agent-memoryd"
args = ["mcp"]
